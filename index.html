<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mijn CGI · Smart Media Production — Max Helmantel</title>

<!--
  CGI-PRESENTATIE als kindertekening — Smart Media Production (blok 8).
  Zelfstandig: geen build, geen dependencies, geen localStorage.
  Het midden (de fotocirkel) = onderdeel "About me" (klikbaar).
  7 doodles eromheen = de andere 7 CGI-onderwerpen. Samen 8.
  Vaste gedragsindicatoren Lerend Vermogen: LV 1.3 en LV 4.3.
  Tekst + bewijs staan onderaan in het JS-object DATA. Foto -> assets/kind.jpg.
-->

<style>
:root{
  --paper:#fbf7ec; --ink:#4a4540; --pencil:#bdb6a8; --pencil-soft:#efe9db;
  --shadow:0 10px 30px rgba(80,60,30,.16);
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  font-family:'Chalkboard SE','Comic Sans MS','Comic Neue','Patrick Hand',
              'Bradley Hand','Segoe Print',cursive,system-ui,sans-serif;
  color:var(--ink); background:var(--paper);
  background-image:
    radial-gradient(rgba(150,130,90,.05) 1px, transparent 1.4px),
    radial-gradient(rgba(150,130,90,.04) 1px, transparent 1.4px);
  background-size:7px 7px, 11px 11px; background-position:0 0, 3px 4px;
  line-height:1.45; -webkit-text-size-adjust:100%;
}
.wrap{max-width:1040px;margin:0 auto;padding:22px 18px 56px}

header.top{text-align:center;margin:6px 0 4px}
header.top h1{font-size:clamp(28px,5.6vw,50px);margin:0;letter-spacing:.5px;
  color:#3b3631;transform:rotate(-1.2deg);text-shadow:1px 2px 0 rgba(0,0,0,.05)}
header.top .sub{font-size:clamp(14px,2.3vw,18px);opacity:.8;margin:3px 0 0}
header.top .hint{display:inline-block;margin-top:9px;font-size:14.5px;opacity:.9;
  padding:5px 14px;border:2px dashed #d8cdb3;border-radius:20px;
  transform:rotate(.5deg);background:rgba(255,255,255,.4)}
header.top .lv{margin-top:8px}
.lvtag{display:inline-block;font-size:12.5px;padding:2px 11px;border-radius:20px;
  border:2px solid #cdbf9e;background:rgba(255,255,255,.5);white-space:nowrap}

.scene{width:100%;height:auto;display:block;margin:6px auto 0;max-width:1000px;touch-action:manipulation}

.doodle{cursor:pointer;outline:none}
.doodle .ln{fill:none;stroke:var(--pencil);stroke-width:4.2;
  stroke-linecap:round;stroke-linejoin:round;transition:stroke .5s ease}
.doodle .fl{fill:none;transition:fill .5s ease}
.doodle .dlabel{fill:#8a8275;font-size:20px;text-anchor:middle;
  transition:fill .4s ease;pointer-events:none}
.doodle .badge{opacity:0;transform-box:fill-box;transform-origin:center;
  transform:scale(.4);transition:opacity .35s ease, transform .35s ease}
.doodle.done .ln{stroke:var(--c)}
.doodle.done .fl{fill:var(--c-soft)}
.doodle.done .dlabel{fill:var(--c)}
.doodle.done .badge{opacity:1;transform:scale(1)}
.doodle .art{transform-box:fill-box;transform-origin:center;transition:transform .25s ease}
@media (hover:hover){.doodle:hover .art{transform:translateY(-4px) rotate(-1deg) scale(1.05)}}
.doodle:focus-visible .art{transform:translateY(-4px) scale(1.06)}
.doodle:focus-visible .ring-focus{opacity:1}
.ring-focus{opacity:0;fill:#fff;fill-opacity:0;stroke:#1c7ed6;stroke-width:3;
  stroke-dasharray:5 6;transition:opacity .2s;pointer-events:all;cursor:pointer}
#facePlaceholder .ln{stroke:#cbbfa6}

#tangle{transition:opacity .8s ease}
#calm{opacity:0;transition:opacity .8s ease}
.scene.bright #sunrays{animation:spin 26s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#sunrays{transform-box:fill-box;transform-origin:center}

.legend{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin:18px auto 0;max-width:880px}
.chip{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font:inherit;font-size:15px;
  color:var(--ink);background:rgba(255,255,255,.65);border:2.5px solid var(--pencil);
  border-radius:30px;padding:6px 14px 7px;transition:border-color .35s,background .35s,transform .15s}
.chip:hover{transform:translateY(-2px) rotate(-.5deg)}
.chip:focus-visible{outline:3px dashed #1c7ed6;outline-offset:2px}
.chip .dot{width:13px;height:13px;border-radius:50%;background:transparent;
  border:2.5px solid var(--pencil);transition:background .35s,border-color .35s;flex:none}
.chip.done{border-color:var(--c);background:var(--c-soft)}
.chip.done .dot{background:var(--c);border-color:var(--c)}

.progress{text-align:center;margin:14px 0 0;font-size:16px;min-height:22px;opacity:.9}

.overlay{position:fixed;inset:0;display:none;place-items:center;background:rgba(60,45,25,.42);
  padding:18px;z-index:50;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
.overlay.open{display:grid}
.card{width:min(540px,100%);max-height:88vh;overflow:auto;background:#fffdf6;border-radius:18px;
  box-shadow:var(--shadow);border:3px solid var(--c,#e4c98b);padding:22px 22px 20px;
  position:relative;transform:rotate(-.5deg)}
.card h2{margin:.1em 0 .05em;font-size:25px;color:var(--c,#3b3631)}
.card .sub2{margin:0 0 6px;font-size:15.5px;opacity:.7}
.pill-lv{display:inline-block;font-size:12.5px;color:#3b6e2f;background:#e6f3df;
  border:2px solid #bfe0b0;border-radius:20px;padding:2px 10px;margin:2px 0 12px}
.pill-lv[hidden]{display:none}
.card .body{font-size:16.5px;color:#48433d}
.card .body p{margin:.4em 0 .8em}
.drop{margin:14px 0 4px}
.btnrow{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.btn,a.btn{display:inline-block;font:inherit;font-size:15px;cursor:pointer;background:var(--c,#e4572e);
  color:#fff;text-decoration:none;border:none;border-radius:24px;padding:9px 18px;
  box-shadow:0 4px 0 rgba(0,0,0,.12);transition:transform .12s,box-shadow .12s}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.12)}
.btn.ghost{background:transparent;color:#6f675c;box-shadow:none;border:2.5px solid #d9cfb6}
.card .actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:18px;
  padding-top:14px;border-top:2px dashed #e9e0c9}
.btn.ok.is-on{background:#2f9e44}
.btn.ok.is-on::after{content:'  ✓'}
.closeX{position:absolute;top:10px;right:12px;border:none;background:none;font:inherit;
  font-size:26px;line-height:1;cursor:pointer;color:#b1a892;padding:4px 8px;border-radius:50%}
.closeX:hover{color:#6f675c;background:rgba(0,0,0,.05)}

footer.sign{text-align:right;margin:30px 4px 0;opacity:.85}
footer.sign .name{font-size:23px;transform:rotate(-3deg);display:inline-block}
footer.sign img{height:26px;vertical-align:middle;margin-left:8px;opacity:.9}

@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
@media (max-width:560px){.card{transform:none}header.top h1{transform:rotate(-.6deg)}}
@media print{.overlay{display:none!important}body{background:#fff}}
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <h1>Mijn CGI</h1>
    <p class="sub">een kindertekening · Smart Media Production — Max Helmantel</p>
    <div><span class="hint">Tik op mij en op elke tekening, en kleur mijn verhaal compleet 🖍️</span></div>
    <div class="lv"><span class="lvtag">Lerend Vermogen aangetoond met&nbsp;<b>LV&nbsp;1.3</b>&nbsp;en&nbsp;<b>LV&nbsp;4.3</b></span></div>
  </header>

  <!-- ===================== DE TEKENING ===================== -->
  <svg class="scene" viewBox="0 0 1000 840" role="group"
       aria-label="Zelfportret met zeven aanklikbare tekeningen; de acht onderdelen van mijn CGI-presentatie">
    <defs>
      <filter id="rough" x="-8%" y="-8%" width="116%" height="116%">
        <feTurbulence type="fractalNoise" baseFrequency="0.012 0.02" numOctaves="2" seed="7" result="n"/>
        <feDisplacementMap in="SourceGraphic" in2="n" scale="3.2" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <clipPath id="photoClip"><circle cx="500" cy="420" r="80"/></clipPath>
    </defs>

    <!-- grassprietjes onder de figuur -->
    <g filter="url(#rough)" opacity=".6">
      <g stroke="#8fbf6a" stroke-width="3.4" stroke-linecap="round" fill="none">
        <path d="M470,560 q5,-18 0,-30 M482,560 q11,-13 16,-25"/>
        <path d="M520,560 q-5,-18 0,-30 M508,560 q-11,-13 -16,-25"/>
      </g>
    </g>

    <!-- ===== gedachtenwolk ===== -->
    <g fill="var(--paper)" stroke="#cabfa6" stroke-width="3" filter="url(#rough)">
      <circle cx="505" cy="320" r="11" stroke="#cabfa6"/>
      <circle cx="500" cy="296" r="8"  stroke="#cabfa6"/>
      <circle cx="498" cy="277" r="6"  stroke="#cabfa6"/>
    </g>
    <g filter="url(#rough)" fill="var(--paper)" stroke="#bdb298" stroke-width="3.4">
      <g stroke="#bdb298">
        <circle cx="430" cy="150" r="42"/><circle cx="470" cy="118" r="46"/>
        <circle cx="520" cy="110" r="50"/><circle cx="566" cy="126" r="44"/>
        <circle cx="602" cy="152" r="40"/><circle cx="562" cy="182" r="46"/>
        <circle cx="506" cy="190" r="50"/><circle cx="455" cy="182" r="44"/>
      </g>
    </g>
    <g id="tangle" filter="url(#rough)" fill="none" stroke="#9a9183" stroke-width="3.4" stroke-linecap="round">
      <path d="M468,150 q-14,-26 18,-30 q34,-4 30,24 q-3,26 -34,20 q-30,-6 -14,-34
               q16,-26 46,-10 q26,14 8,40 q-18,24 -44,6"/>
      <path d="M500,128 q22,10 14,34 M486,176 q-8,-22 18,-30"/>
    </g>
    <g id="calm" filter="url(#rough)">
      <g id="sunrays" stroke="#f3a712" stroke-width="4" stroke-linecap="round">
        <path d="M510,96 V78 M510,204 V222 M456,150 H438 M564,150 H582
                 M472,112 L460,100 M548,112 L560,100 M472,188 L460,200 M548,188 L560,200"/>
      </g>
      <circle cx="510" cy="150" r="31" fill="#ffe08a" stroke="#f3a712" stroke-width="4"/>
      <path d="M497,156 q13,14 26,0" fill="none" stroke="#b9770a" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="500" cy="143" r="3.2" fill="#b9770a"/><circle cx="520" cy="143" r="3.2" fill="#b9770a"/>
    </g>

    <!-- ===== ABOUT ME : de fotocirkel in het midden (klikbaar) ===== -->
    <g class="doodle hot" data-c="about" role="button" tabindex="0" aria-label="About me — dat ben ik"
       style="--c:#e8590c;--c-soft:#f8cba6">
      <rect class="ring-focus" x="402" y="332" width="196" height="250" rx="46"/>
      <g id="facePlaceholder" filter="url(#rough)">
        <circle cx="500" cy="420" r="80" fill="#fdeede"/>
        <g class="ln" fill="none" stroke-width="4" stroke-linecap="round">
          <circle cx="476" cy="411" r="5" fill="#cbbfa6" stroke="none"/>
          <circle cx="524" cy="411" r="5" fill="#cbbfa6" stroke="none"/>
          <path d="M474,448 q26,22 52,0"/>
          <path d="M454,392 q14,-44 92,-12"/>
        </g>
      </g>
      <image href="assets/kind.jpg" x="420" y="340" width="160" height="160"
             clip-path="url(#photoClip)" preserveAspectRatio="xMidYMid slice"
             onerror="this.style.display='none'"/>
      <circle cx="500" cy="420" r="80" fill="none" stroke="#f59f00" stroke-width="6"
              stroke-linecap="round" stroke-dasharray="3 12" filter="url(#rough)"/>
      <path d="M454,488 q46,38 92,0 l10,30 H444 Z" fill="#ffe3b0" stroke="#e8b860"
            stroke-width="3.5" filter="url(#rough)"/>
      <g class="badge"><circle cx="566" cy="356" r="14" fill="#2f9e44"/>
        <path d="M558,356 l6,7 l10,-13" stroke="#fff" stroke-width="3.6" fill="none"
              stroke-linecap="round" stroke-linejoin="round"/></g>
      <text class="dlabel" x="500" y="556">About me</text>
    </g>

    <!-- ====================  7 DOODLES  ===================== -->

    <!-- POP & rol — raket : links boven -->
    <g class="doodle hot" data-c="pop" role="button" tabindex="0" aria-label="POP-leerdoelen en beroepsrol"
       style="--c:#1c7ed6;--c-soft:#b8dbf7" transform="translate(158 250)">
      <rect class="ring-focus" x="-60" y="-90" width="124" height="208" rx="16"/>
      <g class="art" filter="url(#rough)">
        <path class="ln fl" d="M0,-78 C28,-50 28,-6 18,26 H-18 C-28,-6 -28,-50 0,-78Z"/>
        <circle class="ln" cx="0" cy="-34" r="11"/>
        <path class="ln fl" d="M-18,8 L-40,40 L-18,30Z"/>
        <path class="ln fl" d="M18,8 L40,40 L18,30Z"/>
        <path class="ln" d="M-12,30 q12,30 12,46 q0,-16 12,-46"/>
        <g class="badge"><circle cx="40" cy="-58" r="13" fill="#2f9e44"/>
          <path d="M33,-58 l5,6 l9,-12" stroke="#fff" stroke-width="3.5" fill="none"
                stroke-linecap="round" stroke-linejoin="round"/></g>
      </g>
      <text class="dlabel" y="100">POP &amp; rol</text>
    </g>

    <!-- Leerdoel 1 — boombox : links midden -->
    <g class="doodle hot" data-c="leerdoel1" role="button" tabindex="0" aria-label="Leerdoel 1, proces en bewijslast"
       style="--c:#e4572e;--c-soft:#f7c9ba" transform="translate(158 432)">
      <rect class="ring-focus" x="-72" y="-72" width="150" height="194" rx="16"/>
      <g class="art" filter="url(#rough)">
        <rect class="ln fl" x="-58" y="-6" width="116" height="74" rx="12"/>
        <circle class="ln fl" cx="-26" cy="31" r="20"/><circle class="ln" cx="-26" cy="31" r="7"/>
        <circle class="ln fl" cx="28"  cy="31" r="20"/><circle class="ln" cx="28"  cy="31" r="7"/>
        <path class="ln" d="M14,-30 V-58 q0,-8 8,-9 l26,-6"/>
        <circle class="ln fl" cx="10" cy="-28" r="7"/><circle class="ln fl" cx="44" cy="-37" r="7"/>
        <g class="badge"><circle cx="60" cy="-22" r="13" fill="#2f9e44"/>
          <path d="M53,-22 l5,6 l9,-12" stroke="#fff" stroke-width="3.5" fill="none"
                stroke-linecap="round" stroke-linejoin="round"/></g>
      </g>
      <text class="dlabel" y="100">Leerdoel 1</text>
    </g>

    <!-- Reflectie — lamp : links onder -->
    <g class="doodle hot" data-c="reflectie" role="button" tabindex="0" aria-label="Reflectie"
       style="--c:#e0a500;--c-soft:#f7e3a1" transform="translate(158 614)">
      <rect class="ring-focus" x="-66" y="-92" width="132" height="214" rx="16"/>
      <g class="art" filter="url(#rough)">
        <path class="ln fl" d="M-30,18 q-26,-22 -22,-50 q4,-40 52,-40 q48,0 52,40 q4,28 -22,50 q-6,5 -6,16 h-42 q0,-11 -6,-16Z"/>
        <path class="ln" d="M-30,42 h60 M-24,56 h48 M-18,70 q18,10 36,0"/>
        <path class="ln" d="M0,-44 q-14,8 -12,30"/>
        <path class="ln" d="M0,-86 V-72 M-54,-58 L-44,-50 M54,-58 L44,-50 M-64,-12 L-52,-12 M64,-12 L52,-12"/>
        <g class="badge"><circle cx="50" cy="-58" r="13" fill="#2f9e44"/>
          <path d="M43,-58 l5,6 l9,-12" stroke="#fff" stroke-width="3.5" fill="none"
                stroke-linecap="round" stroke-linejoin="round"/></g>
      </g>
      <text class="dlabel" y="104">Reflectie</text>
    </g>

    <!-- Leerdoel 2 — microfoon : rechts boven -->
    <g class="doodle hot" data-c="leerdoel2" role="button" tabindex="0" aria-label="Leerdoel 2, proces en bewijslast"
       style="--c:#2f9e44;--c-soft:#bfe3c8" transform="translate(842 250)">
      <rect class="ring-focus" x="-58" y="-80" width="120" height="200" rx="16"/>
      <g class="art" filter="url(#rough)">
        <rect class="ln fl" x="-22" y="-66" width="44" height="64" rx="22"/>
        <path class="ln" d="M-14,-52 h28 M-14,-40 h28 M-14,-28 h28"/>
        <path class="ln" d="M-40,-12 q40,46 80,0"/>
        <path class="ln" d="M0,30 V58 M-22,62 h44"/>
        <g class="badge"><circle cx="44" cy="-58" r="13" fill="#2f9e44"/>
          <path d="M37,-58 l5,6 l9,-12" stroke="#fff" stroke-width="3.5" fill="none"
                stroke-linecap="round" stroke-linejoin="round"/></g>
      </g>
      <text class="dlabel" y="100">Leerdoel 2</text>
    </g>

    <!-- Ethisch dilemma — weegschaal : rechts midden -->
    <g class="doodle hot" data-c="ethisch" role="button" tabindex="0" aria-label="Ethisch dilemma"
       style="--c:#7048e8;--c-soft:#d3c7f9" transform="translate(842 432)">
      <rect class="ring-focus" x="-74" y="-72" width="158" height="196" rx="16"/>
      <g class="art" filter="url(#rough)">
        <path class="ln" d="M0,-50 V40 M-18,46 H18 M-42,-40 H42"/>
        <path class="ln fl" d="M-42,-40 L-56,-6 H-28 Z"/>
        <path class="ln fl" d="M42,-40 L56,-6 H28 Z"/>
        <circle class="ln" cx="0" cy="-50" r="4"/>
        <g class="badge"><circle cx="54" cy="-44" r="13" fill="#2f9e44"/>
          <path d="M47,-44 l5,6 l9,-12" stroke="#fff" stroke-width="3.5" fill="none"
                stroke-linecap="round" stroke-linejoin="round"/></g>
      </g>
      <text class="dlabel" y="100">Ethisch dilemma</text>
    </g>

    <!-- Visie — hart : rechts onder -->
    <g class="doodle hot" data-c="visie" role="button" tabindex="0" aria-label="Visie als mediamaker"
       style="--c:#d6336c;--c-soft:#f4b9d0" transform="translate(842 614)">
      <rect class="ring-focus" x="-72" y="-60" width="150" height="186" rx="16"/>
      <g class="art" filter="url(#rough)">

        <path class="ln fl" d="M-44,-34 H44 q11,0 11,11 V18 q0,11 -11,11 H4 L-12,48 L-9,29 H-44
                 q-11,0 -11,-11 V-23 q0,-11 11,-11 Z"/>
        <circle class="ln" cx="-16" cy="-3" r="3.6"/><circle class="ln" cx="2" cy="-3" r="3.6"/>
        <circle class="ln" cx="20" cy="-3" r="3.6"/>
        <g class="badge"><circle cx="48" cy="-44" r="13" fill="#2f9e44"/>

      </g>
      <text class="dlabel" y="96">Gespreksstarter</text>
    </g>

  </svg>
  <!-- ===================== /DE TEKENING ===================== -->

  <div class="legend" id="legend" aria-label="Legenda — ook aanklikbaar"></div>
  <p class="progress" id="progress" aria-live="polite"></p>

</div><!-- /wrap -->

<footer class="sign wrap" style="padding-top:0">
  <span class="name">— Max</span><img src="assets/kaires-logo.png" alt="" onerror="this.style.display='none'">
</footer>

<!-- ===================== PANEEL ===================== -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="pTitle">
  <div class="card" id="card" style="--c:#e4572e">
    <button class="closeX" id="closeX" aria-label="Sluiten">×</button>
    <h2 id="pTitle">Titel</h2>
    <p class="sub2" id="pSub">subtitel</p>
    <span class="pill-lv" id="pLv" hidden></span>
    <div class="body" id="pBody"></div>
    <div class="drop" id="pDrop"></div>
    <div class="actions">
      <button class="btn ok" id="pOk" type="button">Zo is het</button>
      <button class="btn ghost" id="pClose" type="button">Sluiten</button>
    </div>
  </div>
</div>

<script>
/* ======================================================================
   DATA — pas hier de TEKST (body) en het BEWIJS (drop) per onderdeel aan.
   Volgorde = volgorde van de legenda. lv = de gedragsindicator die je toont.
   ====================================================================== */
const DATA = {
  about: {
    title:"About me", sub:"Dat ben ik", color:"#e8590c", soft:"#f8cba6",
    body:`<p>Ik ben <b>Max Helmantel</b>, afstudeerder Smart Media Production en
          medeoprichter van <b>Kaires</b>: slimme muziekprofilering voor retail.
          Ik werk op het snijvlak van creativiteit, design en AI en vertaal nieuwe
          technologie snel naar werkende concepten. Mijn rode draad dit blok: groeien
          als <i>creative in the loop</i>.</p>`,
    drop:``
  },
  pop: {
    title:"POP-leerdoelen & beroepsrol", sub:"Waar ik naartoe werk",
    color:"#1c7ed6", soft:"#b8dbf7", lv:"LV 1.3",
    body:`<p>Mijn <b>beroepsrol</b>: <i>creative in the loop</i>, iemand die
          creativiteit, design en techniek verbindt.</p>

/* ====================== logica ====================== */
const order = Object.keys(DATA);
const done  = new Set();
const svg   = document.querySelector('.scene');
const $ = s => document.querySelector(s);

const legend = $('#legend');
order.forEach(c=>{
  const d = DATA[c];
  const b = document.createElement('button');
  b.className='chip'; b.dataset.c=c; b.type='button';
  b.style.setProperty('--c', d.color); b.style.setProperty('--c-soft', d.soft);
  b.innerHTML = `<span class="dot"></span>${d.title.split(' — ')[0]}`;
  b.addEventListener('click', ()=>open(c));
  legend.appendChild(b);
});

const overlay=$('#overlay'), card=$('#card');
let current=null;

function open(c){
  current=c; const d=DATA[c];
  card.style.setProperty('--c', d.color);
  $('#pTitle').textContent=d.title;
  $('#pSub').textContent=d.sub;
  const lv=$('#pLv');
  if(d.lv){ lv.hidden=false; lv.textContent='Toont gedragsindicator · '+d.lv; }
  else lv.hidden=true;
  $('#pBody').innerHTML=d.body;
  const dropEl=$('#pDrop');
  if(d.drop && d.drop.trim()){ dropEl.innerHTML=d.drop; dropEl.style.display=''; }
  else { dropEl.innerHTML=''; dropEl.style.display='none'; }
  const ok=$('#pOk');
  ok.classList.toggle('is-on', done.has(c));
  ok.setAttribute('aria-pressed', done.has(c));
  overlay.classList.add('open');
  $('#closeX').focus();
}
function close(){ overlay.classList.remove('open');
  if(current){ const el=document.querySelector(`.doodle[data-c="${current}"]`); el&&el.focus(); } }
function confirm(c){
  if(done.has(c)) done.delete(c); else done.add(c);
  render();
  const ok=$('#pOk'); ok.classList.toggle('is-on', done.has(c)); ok.setAttribute('aria-pressed', done.has(c));
}
function render(){
  order.forEach(c=>{
    const on = done.has(c);
    document.querySelector(`.doodle[data-c="${c}"]`).classList.toggle('done', on);
    document.querySelector(`.chip[data-c="${c}"]`).classList.toggle('done', on);
  });
  const n=done.size, total=order.length, p=n/total;
  $('#tangle').style.opacity = 1-p;
  $('#calm').style.opacity   = p;
  svg.classList.toggle('bright', n===total);
  const prog=$('#progress');
  if(n===0)      prog.textContent='Nog niets ingekleurd — begin bij mij of een tekening.';
  else if(n<total) prog.textContent=`${n} van de ${total} onderdelen behandeld — de lucht klaart op…`;
  else           prog.textContent='Alle 8 onderdelen behandeld — de gedachtenwolk werd een zonnetje ☀️';
}

document.querySelectorAll('.doodle.hot').forEach(el=>{
  const c=el.dataset.c;
  el.addEventListener('click', ()=>open(c));
  el.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); open(c); }});
});
$('#pOk').addEventListener('click', ()=>confirm(current));
$('#pClose').addEventListener('click', close);
$('#closeX').addEventListener('click', close);
overlay.addEventListener('click', e=>{ if(e.target===overlay) close(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape' && overlay.classList.contains('open')) close(); });

render();
</script>
