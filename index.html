<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mijn CGI · Smart Media Production — Max Helmantel</title>

<!--
  CGI-PRESENTATIE als kindertekening — Smart Media Production (blok 8).
  Zelfstandig: geen build, geen dependencies, geen localStorage.

  >> JOUW EIGEN TEKENINGEN <<
  Elke tekening is een AFBEELDING. Leg je handgetekende plaatjes in assets/ met
  exact deze namen (zie ook BENODIGDE_TEKENINGEN.md):
     assets/pop.png         POP-leerdoelen & beroepsrol
     assets/leerdoel1.png   Leerdoel 1
     assets/leerdoel2.png   Leerdoel 2
     assets/reflectie.png   Reflectie
     assets/ethisch.png     Ethisch dilemma
     assets/visie.png       Visie
     assets/gesprek.png     (optioneel) Gespreksstarter
     assets/kind.jpg        About me (foto of tekening van jezelf)
  Vierkant, transparante of witte achtergrond, ~600x600 px of groter.
  Zolang een plaatje ontbreekt, zie je een nette "plak hier"-placeholder.

  PRESENTATIEMODUS: knop rechtsboven (of toets P). Pijltjes ← → / spatie,
  Esc om te sluiten. Loopt door alle 8 onderdelen heen.
-->

<style>
:root{
  --paper:#fbf7ec; --ink:#4a4540; --pencil:#bdb6a8; --pencil-soft:#efe9db;
  --shadow:0 10px 30px rgba(80,60,30,.16);
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  font-family:'Chalkboard SE','Comic Sans MS','Comic Neue','Patrick Hand',
              'Bradley Hand','Segoe Print',cursive,system-ui,sans-serif;
  color:var(--ink); background:var(--paper);
  background-image:
    radial-gradient(rgba(150,130,90,.05) 1px, transparent 1.4px),
    radial-gradient(rgba(150,130,90,.04) 1px, transparent 1.4px);
  background-size:7px 7px, 11px 11px; background-position:0 0, 3px 4px;
  line-height:1.45; -webkit-text-size-adjust:100%;
}
.wrap{max-width:1040px;margin:0 auto;padding:18px 18px 56px}

/* presentatie-knop */
.topbar{display:flex;justify-content:flex-end;margin-bottom:-6px}
.present-btn{font:inherit;font-size:15px;cursor:pointer;color:#fff;background:#3b6e2f;
  border:none;border-radius:24px;padding:8px 18px;box-shadow:0 4px 0 rgba(0,0,0,.15);
  transition:transform .12s}
.present-btn:hover{transform:translateY(-1px)}
.present-btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.15)}

header.top{text-align:center;margin:0 0 2px}
header.top h1{font-size:clamp(28px,5.6vw,50px);margin:0;letter-spacing:.5px;
  color:#3b3631;transform:rotate(-1.2deg);text-shadow:1px 2px 0 rgba(0,0,0,.05)}
header.top .sub{font-size:clamp(14px,2.3vw,18px);opacity:.8;margin:3px 0 0}
header.top .hint{display:inline-block;margin-top:9px;font-size:14.5px;opacity:.9;
  padding:5px 14px;border:2px dashed #d8cdb3;border-radius:20px;
  transform:rotate(.5deg);background:rgba(255,255,255,.4)}
header.top .lv{margin-top:8px}
.lvtag{display:inline-block;font-size:12.5px;padding:2px 11px;border-radius:20px;
  border:2px solid #cdbf9e;background:rgba(255,255,255,.5);white-space:nowrap}

.scene{width:100%;height:auto;aspect-ratio:1000/770;display:block;margin:6px auto 0;max-width:1000px;touch-action:manipulation}

.doodle{cursor:pointer;outline:none}
.doodle .dlabel{fill:#8a8275;font-size:20px;text-anchor:middle;
  transition:fill .4s ease;pointer-events:none}
.doodle.done .dlabel{fill:var(--c)}
.doodle .badge{opacity:0;transform-box:fill-box;transform-origin:center;
  transform:scale(.4);transition:opacity .35s ease, transform .35s ease}
.doodle.done .badge{opacity:1;transform:scale(1)}

/* afbeelding-slot voor jouw tekening */
.slot{transform-box:fill-box;transform-origin:center;transition:transform .25s ease}
.slot .draw{filter:grayscale(.85);opacity:.5;transition:filter .5s ease,opacity .5s ease}
.doodle.done .slot .draw{filter:none;opacity:1}
.slot .ph{transition:opacity .3s ease}
.slot.loaded .ph{opacity:0;pointer-events:none}
.ph rect{fill:rgba(255,255,255,.45);stroke:var(--c,#cdbf9e);stroke-width:2.5;stroke-dasharray:6 7}
.ph-name{fill:#8a8275;font-size:15px;text-anchor:middle;font-family:ui-monospace,Menlo,monospace}
.ph-hint{fill:#aaa092;font-size:13px;text-anchor:middle}
@media (hover:hover){.doodle:hover .slot{transform:translateY(-4px) rotate(-1deg) scale(1.04)}}
.doodle:focus-visible .slot{transform:translateY(-4px) scale(1.05)}
.doodle:focus-visible .ring-focus{opacity:1}
.ring-focus{opacity:0;fill:#fff;fill-opacity:0;stroke:#1c7ed6;stroke-width:3;
  stroke-dasharray:5 6;transition:opacity .2s;pointer-events:all;cursor:pointer}
#facePlaceholder .ln{stroke:#cbbfa6}

#tangle{transition:opacity .8s ease}
#calm{opacity:0;transition:opacity .8s ease}
.scene.bright #sunrays{animation:spin 26s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#sunrays{transform-box:fill-box;transform-origin:center}

.legend{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin:18px auto 0;max-width:900px}
.chip{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font:inherit;font-size:15px;
  color:var(--ink);background:rgba(255,255,255,.65);border:2.5px solid var(--pencil);
  border-radius:30px;padding:6px 14px 7px;transition:border-color .35s,background .35s,transform .15s}
.chip:hover{transform:translateY(-2px) rotate(-.5deg)}
.chip:focus-visible{outline:3px dashed #1c7ed6;outline-offset:2px}
.chip .dot{width:13px;height:13px;border-radius:50%;background:transparent;
  border:2.5px solid var(--pencil);transition:background .35s,border-color .35s;flex:none}
.chip.done{border-color:var(--c);background:var(--c-soft)}
.chip.done .dot{background:var(--c);border-color:var(--c)}

.progress{text-align:center;margin:14px 0 0;font-size:16px;min-height:22px;opacity:.9}

/* paneel (klik op tekening) */
.overlay{position:fixed;inset:0;display:none;place-items:center;background:rgba(60,45,25,.42);
  padding:18px;z-index:50;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
.overlay.open{display:grid}
.card{width:min(540px,100%);max-height:88vh;overflow:auto;background:#fffdf6;border-radius:18px;
  box-shadow:var(--shadow);border:3px solid var(--c,#e4c98b);padding:22px 22px 20px;
  position:relative;transform:rotate(-.5deg)}
.card h2{margin:.1em 0 .05em;font-size:25px;color:var(--c,#3b3631)}
.card .sub2{margin:0 0 6px;font-size:15.5px;opacity:.7}
.pill-lv{display:inline-block;font-size:12.5px;color:#3b6e2f;background:#e6f3df;
  border:2px solid #bfe0b0;border-radius:20px;padding:2px 10px;margin:2px 0 12px}
.pill-lv[hidden]{display:none}
.body{font-size:16.5px;color:#48433d}
.body p{margin:.4em 0 .8em}
.drop{margin:14px 0 4px}
.btnrow{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.btn,a.btn{display:inline-block;font:inherit;font-size:15px;cursor:pointer;background:var(--c,#e4572e);
  color:#fff;text-decoration:none;border:none;border-radius:24px;padding:9px 18px;
  box-shadow:0 4px 0 rgba(0,0,0,.12);transition:transform .12s,box-shadow .12s}
.btn:hover{transform:translateY(-1px)}.btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.12)}
.btn.ghost{background:transparent;color:#6f675c;box-shadow:none;border:2.5px solid #d9cfb6}
.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:18px;
  padding-top:14px;border-top:2px dashed #e9e0c9}
.btn.ok.is-on{background:#2f9e44}.btn.ok.is-on::after{content:'  ✓'}
.closeX{position:absolute;top:10px;right:12px;border:none;background:none;font:inherit;
  font-size:26px;line-height:1;cursor:pointer;color:#b1a892;padding:4px 8px;border-radius:50%}
.closeX:hover{color:#6f675c;background:rgba(0,0,0,.05)}

footer.sign{text-align:right;margin:30px 4px 0;opacity:.85}
footer.sign .name{font-size:23px;transform:rotate(-3deg);display:inline-block}
footer.sign img{height:26px;vertical-align:middle;margin-left:8px;opacity:.9}

/* ===== PRESENTATIEMODUS ===== */
.present{position:fixed;inset:0;z-index:90;background:var(--paper);
  background-image:radial-gradient(rgba(150,130,90,.05) 1px,transparent 1.4px);
  background-size:8px 8px;display:flex;flex-direction:column}
.present[hidden]{display:none}
.pres-exit{position:absolute;top:14px;right:18px;z-index:2;border:none;background:rgba(255,255,255,.6);
  font:inherit;font-size:24px;line-height:1;cursor:pointer;color:#6f675c;padding:6px 12px;border-radius:50%}
.pres-stage{flex:1;display:flex;gap:36px;align-items:center;justify-content:center;
  padding:46px 40px 10px;max-width:1120px;margin:0 auto;width:100%}
.pres-figure{flex:0 0 42%;display:flex;align-items:center;justify-content:center;min-height:30vh}
.pres-figure img{max-width:100%;max-height:48vh;border-radius:14px}
.pres-figure img.round{border-radius:50%;border:6px solid #f59f00;width:min(40vh,320px);height:min(40vh,320px);object-fit:cover}
.pres-figure.noimg{flex-direction:column;color:#b6ab97}
.pres-figure.noimg::before{content:'✎';font-size:96px;opacity:.5}
.pres-figure.noimg::after{content:attr(data-name);font-family:ui-monospace,Menlo,monospace;font-size:15px;margin-top:6px}
.pres-copy{flex:1;max-width:560px}
.pres-count{font-size:14px;opacity:.55;letter-spacing:.5px}
.pres-copy h2{font-size:clamp(26px,4vw,38px);margin:.1em 0 .1em;color:#3b3631}
.pres-sub{font-size:18px;opacity:.7;margin:0 0 10px}
.pres-body{font-size:clamp(17px,2.1vw,20px);color:#46413b}
.pres-body p{margin:.4em 0 .7em}
.pres-drop{margin-top:14px}
.pres-nav{display:flex;gap:20px;align-items:center;justify-content:center;padding:10px 0 24px}
.pres-arrow{font:inherit;font-size:22px;cursor:pointer;width:54px;height:54px;border-radius:50%;
  border:2.5px solid #d3c9b2;background:#fff;color:#5a5247;box-shadow:0 4px 0 rgba(0,0,0,.08);transition:transform .12s}
.pres-arrow:hover{transform:translateY(-1px)}.pres-arrow:active{transform:translateY(2px);box-shadow:none}
.pres-dots{display:flex;gap:9px;align-items:center}
.pres-dots b{width:11px;height:11px;border-radius:50%;background:#d8cdb3;cursor:pointer;transition:background .2s,transform .2s}
.pres-dots b.on{background:#3b6e2f;transform:scale(1.25)}

@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
@media (max-width:760px){
  .pres-stage{flex-direction:column;gap:14px;padding:54px 20px 8px}
  .pres-figure{flex:none;min-height:0}.pres-figure img{max-height:30vh}
  .pres-figure img.round{width:34vh;height:34vh}
}
@media (max-width:560px){.card{transform:none}header.top h1{transform:rotate(-.6deg)}}
@media print{.overlay,.present{display:none!important}body{background:#fff}}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar"><button class="present-btn" id="presBtn">▶ Presentatiemodus</button></div>

  <header class="top">
    <h1>Mijn CGI</h1>
    <p class="sub">een kindertekening · Smart Media Production — Max Helmantel</p>
    <div><span class="hint">Tik op mij en op elke tekening, en kleur mijn verhaal compleet 🖍️</span></div>
    <div class="lv"><span class="lvtag">Lerend Vermogen aangetoond met&nbsp;<b>LV&nbsp;1.3</b>&nbsp;en&nbsp;<b>LV&nbsp;4.3</b></span></div>
  </header>

  <!-- ===================== DE TEKENING ===================== -->
  <svg class="scene" viewBox="0 0 1000 770" width="1000" height="770" role="group"
       aria-label="Zelfportret met vijf aanklikbare tekeningen">
    <defs>
      <filter id="rough" x="-8%" y="-8%" width="116%" height="116%">
        <feTurbulence type="fractalNoise" baseFrequency="0.012 0.02" numOctaves="2" seed="7" result="n"/>
        <feDisplacementMap in="SourceGraphic" in2="n" scale="3.2" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <clipPath id="photoClip"><circle cx="500" cy="400" r="80"/></clipPath>
    </defs>

    <g filter="url(#rough)" opacity=".6">
      <g stroke="#8fbf6a" stroke-width="3.4" stroke-linecap="round" fill="none">
        <path d="M470,540 q5,-18 0,-30 M482,540 q11,-13 16,-25"/>
        <path d="M520,540 q-5,-18 0,-30 M508,540 q-11,-13 -16,-25"/>
      </g>
    </g>

    <!-- gedachtenwolk -->
    <g fill="var(--paper)" stroke="#cabfa6" stroke-width="3" filter="url(#rough)">
      <circle cx="505" cy="300" r="11" stroke="#cabfa6"/>
      <circle cx="500" cy="277" r="8"  stroke="#cabfa6"/>
      <circle cx="498" cy="259" r="6"  stroke="#cabfa6"/>
    </g>
    <g filter="url(#rough)" fill="var(--paper)" stroke="#bdb298" stroke-width="3.4">
      <g stroke="#bdb298">
        <circle cx="430" cy="140" r="42"/><circle cx="470" cy="108" r="46"/>
        <circle cx="520" cy="100" r="50"/><circle cx="566" cy="116" r="44"/>
        <circle cx="602" cy="142" r="40"/><circle cx="562" cy="172" r="46"/>
        <circle cx="506" cy="180" r="50"/><circle cx="455" cy="172" r="44"/>
      </g>
    </g>
    <g id="tangle" filter="url(#rough)" fill="none" stroke="#9a9183" stroke-width="3.4" stroke-linecap="round">
      <path d="M468,140 q-14,-26 18,-30 q34,-4 30,24 q-3,26 -34,20 q-30,-6 -14,-34
               q16,-26 46,-10 q26,14 8,40 q-18,24 -44,6"/>
      <path d="M500,118 q22,10 14,34 M486,166 q-8,-22 18,-30"/>
    </g>
    <g id="calm" filter="url(#rough)">
      <g id="sunrays" stroke="#f3a712" stroke-width="4" stroke-linecap="round">
        <path d="M510,86 V68 M510,194 V212 M456,140 H438 M564,140 H582
                 M472,102 L460,90 M548,102 L560,90 M472,178 L460,190 M548,178 L560,190"/>
      </g>
      <circle cx="510" cy="140" r="31" fill="#ffe08a" stroke="#f3a712" stroke-width="4"/>
      <path d="M497,146 q13,14 26,0" fill="none" stroke="#b9770a" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="500" cy="133" r="3.2" fill="#b9770a"/><circle cx="520" cy="133" r="3.2" fill="#b9770a"/>
    </g>

    <!-- ABOUT ME : fotocirkel midden (klikbaar) -->
    <g class="doodle hot" data-c="about" role="button" tabindex="0" aria-label="About me — dat ben ik"
       style="--c:#e8590c;--c-soft:#f8cba6">
      <rect class="ring-focus" x="402" y="312" width="196" height="250" rx="46"/>
      <g id="facePlaceholder" filter="url(#rough)">
        <circle cx="500" cy="400" r="80" fill="#fdeede"/>
        <g class="ln" fill="none" stroke-width="4" stroke-linecap="round">
          <circle cx="476" cy="391" r="5" fill="#cbbfa6" stroke="none"/>
          <circle cx="524" cy="391" r="5" fill="#cbbfa6" stroke="none"/>
          <path d="M474,428 q26,22 52,0"/>
          <path d="M454,372 q14,-44 92,-12"/>
        </g>
      </g>
      <image href="assets/kind.png" x="420" y="320" width="160" height="160"
             clip-path="url(#photoClip)" preserveAspectRatio="xMidYMid slice"
             onerror="this.style.display='none'"/>
      <circle cx="500" cy="400" r="80" fill="none" stroke="#f59f00" stroke-width="6"
              stroke-linecap="round" stroke-dasharray="3 12" filter="url(#rough)"/>
      <path d="M454,468 q46,38 92,0 l10,30 H444 Z" fill="#ffe3b0" stroke="#e8b860"
            stroke-width="3.5" filter="url(#rough)"/>
      <g class="badge"><circle cx="566" cy="336" r="14" fill="#2f9e44"/>
        <path d="M558,336 l6,7 l10,-13" stroke="#fff" stroke-width="3.6" fill="none"
              stroke-linecap="round" stroke-linejoin="round"/></g>
      <text class="dlabel" x="500" y="536">About me</text>
    </g>

    <!-- 5 tekening-slots (leerdoelen gebundeld) -->
    <g class="doodle hot" data-c="pop" role="button" tabindex="0" aria-label="POP-leerdoelen en beroepsrol"
       style="--c:#1c7ed6;--c-soft:#b8dbf7" transform="translate(158 290)">
      <rect class="ring-focus" x="-80" y="-78" width="160" height="190" rx="16"/>
      <g class="slot" data-slot="pop">
        <g class="ph"><rect x="-60" y="-62" width="120" height="120" rx="16"/>
          <text class="ph-name" y="-4">pop.png</text><text class="ph-hint" y="20">jouw tekening</text></g>
        <image class="draw" href="assets/pop.png" x="-64" y="-66" width="128" height="128" preserveAspectRatio="xMidYMid meet"/>
      </g>
      <g class="badge"><circle cx="54" cy="-54" r="13" fill="#2f9e44"/>
        <path d="M47,-54 l5,6 l9,-12" stroke="#fff" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
      <text class="dlabel" y="100">POP &amp; rol</text>
    </g>

    <g class="doodle hot" data-c="leerdoelen" role="button" tabindex="0" aria-label="Leerdoelen — proces en bewijslast"
       style="--c:#2f9e44;--c-soft:#bfe3c8" transform="translate(842 290)">
      <rect class="ring-focus" x="-80" y="-78" width="160" height="190" rx="16"/>
      <g class="slot" data-slot="leerdoelen">
        <g class="ph"><rect x="-60" y="-62" width="120" height="120" rx="16"/>
          <text class="ph-name" y="-4">leerdoelen.png</text><text class="ph-hint" y="20">jouw tekening</text></g>
        <image class="draw" href="assets/leerdoelen.png" x="-64" y="-66" width="128" height="128" preserveAspectRatio="xMidYMid meet"/>
      </g>
      <g class="badge"><circle cx="54" cy="-54" r="13" fill="#2f9e44"/>
        <path d="M47,-54 l5,6 l9,-12" stroke="#fff" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
      <text class="dlabel" y="100">Leerdoelen</text>
    </g>

    <g class="doodle hot" data-c="reflectie" role="button" tabindex="0" aria-label="Reflectie"
       style="--c:#e0a500;--c-soft:#f7e3a1" transform="translate(158 500)">
      <rect class="ring-focus" x="-80" y="-78" width="160" height="190" rx="16"/>
      <g class="slot" data-slot="reflectie">
        <g class="ph"><rect x="-60" y="-62" width="120" height="120" rx="16"/>
          <text class="ph-name" y="-4">reflectie.png</text><text class="ph-hint" y="20">jouw tekening</text></g>
        <image class="draw" href="assets/reflectie.png" x="-64" y="-66" width="128" height="128" preserveAspectRatio="xMidYMid meet"/>
      </g>
      <g class="badge"><circle cx="54" cy="-54" r="13" fill="#2f9e44"/>
        <path d="M47,-54 l5,6 l9,-12" stroke="#fff" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
      <text class="dlabel" y="100">Reflectie</text>
    </g>

    <g class="doodle hot" data-c="ethisch" role="button" tabindex="0" aria-label="Ethisch dilemma"
       style="--c:#7048e8;--c-soft:#d3c7f9" transform="translate(842 500)">
      <rect class="ring-focus" x="-80" y="-78" width="160" height="190" rx="16"/>
      <g class="slot" data-slot="ethisch">
        <g class="ph"><rect x="-60" y="-62" width="120" height="120" rx="16"/>
          <text class="ph-name" y="-4">ethisch.png</text><text class="ph-hint" y="20">jouw tekening</text></g>
        <image class="draw" href="assets/ethisch.png" x="-64" y="-66" width="128" height="128" preserveAspectRatio="xMidYMid meet"/>
      </g>
      <g class="badge"><circle cx="54" cy="-54" r="13" fill="#2f9e44"/>
        <path d="M47,-54 l5,6 l9,-12" stroke="#fff" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
      <text class="dlabel" y="100">Ethisch dilemma</text>
    </g>

    <g class="doodle hot" data-c="visie" role="button" tabindex="0" aria-label="Visie als mediamaker"
       style="--c:#d6336c;--c-soft:#f4b9d0" transform="translate(500 648)">
      <rect class="ring-focus" x="-80" y="-78" width="160" height="190" rx="16"/>
      <g class="slot" data-slot="visie">
        <g class="ph"><rect x="-60" y="-62" width="120" height="120" rx="16"/>
          <text class="ph-name" y="-4">visie.png</text><text class="ph-hint" y="20">jouw tekening</text></g>
        <image class="draw" href="assets/visie.png" x="-64" y="-66" width="128" height="128" preserveAspectRatio="xMidYMid meet"/>
      </g>
      <g class="badge"><circle cx="54" cy="-54" r="13" fill="#2f9e44"/>
        <path d="M47,-54 l5,6 l9,-12" stroke="#fff" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
      <text class="dlabel" y="100">Visie</text>
    </g>

  </svg>
  <!-- ===================== /DE TEKENING ===================== -->

  <div class="legend" id="legend" aria-label="Legenda — ook aanklikbaar"></div>
  <p class="progress" id="progress" aria-live="polite"></p>

</div><!-- /wrap -->

<footer class="sign wrap" style="padding-top:0">
  <span class="name">— Max</span><img src="assets/kaires-logo.png" alt="" onerror="this.style.display='none'">
</footer>

<!-- paneel -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="pTitle">
  <div class="card" id="card" style="--c:#e4572e">
    <button class="closeX" id="closeX" aria-label="Sluiten">×</button>
    <h2 id="pTitle">Titel</h2>
    <p class="sub2" id="pSub">subtitel</p>
    <span class="pill-lv" id="pLv" hidden></span>
    <div class="body" id="pBody"></div>
    <div class="drop" id="pDrop"></div>
    <div class="actions">
      <button class="btn ok" id="pOk" type="button">Zo is het</button>
      <button class="btn ghost" id="pClose" type="button">Sluiten</button>
    </div>
  </div>
</div>

<!-- ===================== PRESENTATIEMODUS ===================== -->
<div class="present" id="present" hidden role="dialog" aria-modal="true" aria-label="Presentatiemodus">
  <button class="pres-exit" id="presExit" aria-label="Sluit presentatie">✕</button>
  <div class="pres-stage">
    <div class="pres-figure" id="presFigure"></div>
    <div class="pres-copy">
      <div class="pres-count" id="presCount"></div>
      <h2 id="presTitle"></h2>
      <p class="pres-sub" id="presSub"></p>
      <span class="pill-lv" id="presLv" hidden></span>
      <div class="pres-body" id="presBody"></div>
      <div class="pres-drop" id="presDrop"></div>
    </div>
  </div>
  <div class="pres-nav">
    <button class="pres-arrow" id="presPrev" aria-label="Vorige">←</button>
    <div class="pres-dots" id="presDots"></div>
    <button class="pres-arrow" id="presNext" aria-label="Volgende">→</button>
  </div>
</div>

<script>
/* ======================================================================
   DATA — tekst (body), bewijs (drop), gedragsindicator (lv), tekening (img).
   ====================================================================== */
const DATA = {
  about: {
    title:"About me", sub:"Dat ben ik", color:"#e8590c", soft:"#f8cba6", img:"assets/kind.png",
    body:`<p>Ik ben <b>Max Helmantel</b>, afstudeerder Smart Media Production en
          medeoprichter van <b>Kaires</b>: slimme muziekprofilering voor retail.
          Ik werk op het snijvlak van creativiteit, design en AI en vertaal nieuwe
          technologie snel naar werkende concepten. Mijn rode draad dit blok: groeien
          als <i>creative in the loop</i>.</p>`,
    drop:``
  },
  pop: {
    title:"POP-leerdoelen & beroepsrol", sub:"Waar ik naartoe werk",
    color:"#1c7ed6", soft:"#b8dbf7", lv:"LV 1.3", img:"assets/pop.png",
    body:`<p>Mijn <b>beroepsrol</b>: <i>creative in the loop</i>, iemand die
          creativiteit, design en techniek verbindt.</p>
          <p>Twee leerdoelen staan centraal:</p>
          <p>1. Mezelf positioneren als creative in the loop.<br>
             2. Bewuster werken vanuit rust en focus, en zichtbaarder worden.</p>`,
    drop:`<a class="btn" href="assets/POP.pdf" target="_blank">Open mijn POP</a>`
  },
  leerdoelen: {
    title:"Leerdoelen", sub:"Proces & bewijslast",
    color:"#2f9e44", soft:"#bfe3c8", lv:"LV 1.3", img:"assets/leerdoelen.png",
    body:`<p><b>Leerdoel 1 — creative in the loop:</b> laten zien dat creativiteit
          relevant blijft in een tijd van AI. Met Kaires bouwde ik van concept naar
          werkend product (de CAS-engine) en gaf ik trainingen.</p>
          <p><b>Leerdoel 2 — rust, focus &amp; zichtbaarheid:</b> bewuster kiezen waar ik
          mijn energie in steek, en zichtbaarder worden via de keynote, mijn netwerk en
          LinkedIn.</p>
          <p><b>Bewijslast:</b> het Kaires-product (hoor het hieronder), het impactverslag,
          het merk en de keynote/het netwerk.</p>`,
    drop:`<audio controls preload="none" src="assets/kaires-fragment.mp3" style="width:100%;margin-bottom:10px"></audio>
          <div class="btnrow">
            <a class="btn" href="assets/kaires-workflow.pdf" target="_blank">Het muziekprofilering-proces</a>
            <a class="btn ghost" href="assets/kaires-impactverslag.pdf" target="_blank">Impactverslag</a>
            <a class="btn ghost" href="assets/kaires-brandbook.pdf" target="_blank">Merk &amp; positionering</a>
          </div>`
  },
  reflectie: {
    title:"Reflectie", sub:"Wat ik over mezelf leerde",
    color:"#e0a500", soft:"#f7e3a1", lv:"LV 1.3", img:"assets/reflectie.png",
    body:`<p>Hard werken is niet hetzelfde als goed werken. Mijn beste werk ontstaat bij
          onderwerpen waar ik écht nieuwsgierig naar ben. Door steeds feedback te vragen
          en bij te sturen, kreeg ik meer inzicht in mijn eigen leerproces, en leerde ik
          ambitie en rust te combineren.</p>`,
    drop:``
  },
  ethisch: {
    title:"Ethisch dilemma", sub:"AI, muziek & makers",
    color:"#7048e8", soft:"#d3c7f9", lv:"LV 4.3", img:"assets/ethisch.png",
    body:`<p>Met Kaires zet ik <b>AI-gegenereerde muziek</b> in voor retail. Dat roept
          een vraag op: wat betekent dit voor de waarde van menselijke makers en
          muzikanten? Mag je AI-muziek inzetten zonder het te labelen?</p>
          <p>Ik weeg efficiëntie en kosten af tegen eerlijkheid naar artiesten en
          transparantie naar de luisteraar, en kies bewust voor transparant gebruik.</p>`,
    drop:``
  },
  visie: {
    title:"Visie als mediamaker", sub:"Creative in the loop",
    color:"#d6336c", soft:"#f4b9d0", lv:"LV 4.3", img:"assets/visie.png",
    body:`<p>Creativiteit blijft relevant in een tijd van AI. Met Kaires maak ik
          <b>context-adaptieve, AI-gegenereerde muziek</b> en positioneer ik die niet als
          goedkoop alternatief, maar als <b>premium</b>.</p>
          <p>Als <i>creative in the loop</i> verbind ik creativiteit, design en techniek,
          en wil ik Kaires als <b>thought leader</b> naar buiten brengen.</p>`,
    drop:``
  },
  gesprek: {
    title:"Gespreksstarter", sub:"Vraag voor het gesprek",
    color:"#0c8599", soft:"#ace3ec", img:"assets/gesprek.png",
    body:`<p style="font-size:18px"><i>"Als AI straks elke noot kan genereren, is de
          creatief dan nog <b>maker</b> of vooral <b>curator</b>, en waar ligt dan de
          waarde?"</i></p>
          <p>Hier ga ik graag met jullie het gesprek over aan.</p>`,
    drop:``
  }
};

const order = Object.keys(DATA);
const done  = new Set();
const svg   = document.querySelector('.scene');
const $ = s => document.querySelector(s);

/* tekening-slots: placeholder weg zodra een plaatje laadt; bij ontbreken
   verbergen we het (gebroken) plaatje zodat alleen de placeholder blijft. */
document.querySelectorAll('.slot .draw').forEach(img=>{
  img.addEventListener('load', ()=> img.closest('.slot').classList.add('loaded'));
  img.addEventListener('error', ()=>{ img.style.display='none'; });
});

/* legenda */
const legend = $('#legend');
order.forEach(c=>{
  const d = DATA[c];
  const b = document.createElement('button');
  b.className='chip'; b.dataset.c=c; b.type='button';
  b.style.setProperty('--c', d.color); b.style.setProperty('--c-soft', d.soft);
  b.innerHTML = `<span class="dot"></span>${d.title.split(' — ')[0]}`;
  b.addEventListener('click', ()=>open(c));
  legend.appendChild(b);
});

/* paneel */
const overlay=$('#overlay'), card=$('#card');
let current=null;
function open(c){
  current=c; const d=DATA[c];
  card.style.setProperty('--c', d.color);
  $('#pTitle').textContent=d.title; $('#pSub').textContent=d.sub;
  const lv=$('#pLv');
  if(d.lv){ lv.hidden=false; lv.textContent='Toont gedragsindicator · '+d.lv; } else lv.hidden=true;
  $('#pBody').innerHTML=d.body;
  const dropEl=$('#pDrop');
  if(d.drop && d.drop.trim()){ dropEl.innerHTML=d.drop; dropEl.style.display=''; }
  else { dropEl.innerHTML=''; dropEl.style.display='none'; }
  const ok=$('#pOk'); ok.classList.toggle('is-on', done.has(c)); ok.setAttribute('aria-pressed', done.has(c));
  overlay.classList.add('open'); $('#closeX').focus();
}
function close(){ overlay.classList.remove('open');
  if(current){ const el=document.querySelector(`.doodle[data-c="${current}"]`); el&&el.focus(); } }
function confirm(c){
  if(done.has(c)) done.delete(c); else done.add(c);
  render();
  const ok=$('#pOk'); ok.classList.toggle('is-on', done.has(c)); ok.setAttribute('aria-pressed', done.has(c));
}
function render(){
  order.forEach(c=>{
    const on = done.has(c);
    const el = document.querySelector(`.doodle[data-c="${c}"]`);
    if(el) el.classList.toggle('done', on);                 // gesprek heeft geen tekening
    const ch = document.querySelector(`.chip[data-c="${c}"]`);
    if(ch) ch.classList.toggle('done', on);
  });
  const n=done.size, total=order.length, p=n/total;
  $('#tangle').style.opacity = 1-p;
  $('#calm').style.opacity   = p;
  svg.classList.toggle('bright', n===total);
  const prog=$('#progress');
  if(n===0)      prog.textContent='Nog niets ingekleurd — begin bij mij of een tekening.';
  else if(n<total) prog.textContent=`${n} van de ${total} onderdelen behandeld — de lucht klaart op…`;
  else           prog.textContent='Alle onderdelen behandeld — de gedachtenwolk werd een zonnetje ☀️';
}

document.querySelectorAll('.doodle.hot').forEach(el=>{
  const c=el.dataset.c;
  el.addEventListener('click', ()=>open(c));
  el.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); open(c); }});
});
$('#pOk').addEventListener('click', ()=>confirm(current));
$('#pClose').addEventListener('click', close);
$('#closeX').addEventListener('click', close);
overlay.addEventListener('click', e=>{ if(e.target===overlay) close(); });

/* ===== presentatiemodus ===== */
const present=$('#present'), presFigure=$('#presFigure');
let pIdx=0;
const presDots=$('#presDots');
order.forEach((k,i)=>{ const b=document.createElement('b'); b.addEventListener('click',()=>slide(i)); presDots.appendChild(b); });

function slide(i){
  pIdx=(i+order.length)%order.length;
  const key=order[pIdx], d=DATA[key];
  const src=d.img||'';
  presFigure.classList.remove('noimg');
  presFigure.dataset.name = (src.split('/').pop()||'');
  presFigure.innerHTML = src
    ? `<img class="${key==='about'?'round':''}" src="${src}" alt="" onerror="var f=this.closest('.pres-figure');f.classList.add('noimg');this.remove()">`
    : '';
  if(!src) presFigure.classList.add('noimg');
  $('#presCount').textContent = `${pIdx+1} / ${order.length}`;
  const t=$('#presTitle'); t.textContent=d.title; t.style.color=d.color;
  $('#presSub').textContent=d.sub;
  const lv=$('#presLv');
  if(d.lv){ lv.hidden=false; lv.textContent='Toont gedragsindicator · '+d.lv; } else lv.hidden=true;
  $('#presBody').innerHTML=d.body;
  const pd=$('#presDrop');
  if(d.drop && d.drop.trim()){ pd.innerHTML=d.drop; pd.style.display=''; } else { pd.innerHTML=''; pd.style.display='none'; }
  [...presDots.children].forEach((b,j)=>b.classList.toggle('on', j===pIdx));
}
function openPresent(){ present.hidden=false; slide(0);
  try{ if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen(); }catch(e){} }
function closePresent(){ present.hidden=true;
  try{ if(document.fullscreenElement) document.exitFullscreen(); }catch(e){} }
$('#presBtn').addEventListener('click', openPresent);
$('#presExit').addEventListener('click', closePresent);
$('#presPrev').addEventListener('click', ()=>slide(pIdx-1));
$('#presNext').addEventListener('click', ()=>slide(pIdx+1));

document.addEventListener('keydown', e=>{
  if(!present.hidden){
    if(e.key==='ArrowRight'||e.key===' '){ e.preventDefault(); slide(pIdx+1); }
    else if(e.key==='ArrowLeft'){ e.preventDefault(); slide(pIdx-1); }
    else if(e.key==='Escape'){ closePresent(); }
    return;
  }
  if(e.key==='Escape' && overlay.classList.contains('open')){ close(); return; }
  if((e.key==='p'||e.key==='P') && !overlay.classList.contains('open')){ openPresent(); }
});

render();
</script>
</body>
</html>
